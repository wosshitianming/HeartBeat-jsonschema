# ==================== Druid \u6570\u636E\u6E90\uFF08\u6D4B\u8BD5\u73AF\u5883\uFF09 ====================
# \u6CE8\u610F\uFF1Adriver-class-name \u548C type \u5DF2\u5728\u4E3B\u914D\u7F6E\u6587\u4EF6\u7EDF\u4E00\u8BBE\u7F6E\uFF0C\u8FD9\u91CC\u65E0\u9700\u91CD\u590D
spring.datasource.druid.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:heartbeat_test}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.druid.username=${MYSQL_USERNAME:root}
spring.datasource.druid.password=${MYSQL_PASSWORD:root}

# Druid \u8FDE\u63A5\u6C60\u5927\u5C0F\uFF08\u8986\u76D6\u4E3B\u914D\u7F6E\u9ED8\u8BA4\u503C\uFF0C\u6D4B\u8BD5\u73AF\u5883\u9002\u5F53\u8C03\u5C0F\uFF09
spring.datasource.druid.min-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.druid.max-active=${DB_POOL_MAX_SIZE:10}

# ==================== \u5176\u4ED6\u6D4B\u8BD5\u73AF\u5883\u7279\u6709\u914D\u7F6E ====================
heartbeat.middleware.redis.enabled=${TEST_REDIS_ENABLED:${REDIS_ENABLED:false}}
heartbeat.middleware.rocketmq.enabled=${TEST_ROCKETMQ_ENABLED:${ROCKETMQ_ENABLED:false}}
heartbeat.middleware.kafka.enabled=${TEST_KAFKA_ENABLED:${KAFKA_ENABLED:false}}
heartbeat.middleware.mqtt.enabled=${TEST_MQTT_ENABLED:${MQTT_ENABLED:false}}
heartbeat.middleware.quartz.enabled=${TEST_QUARTZ_ENABLED:${QUARTZ_ENABLED:false}}

spring.redis.host=${TEST_REDIS_HOST:${REDIS_HOST:127.0.0.1}}
spring.redis.port=${TEST_REDIS_PORT:${REDIS_PORT:6379}}
spring.redis.database=${REDIS_DATABASE:1}
rocketmq.name-server=${TEST_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
rocketmq.producer.group=${TEST_ROCKETMQ_PRODUCER_GROUP:${ROCKETMQ_PRODUCER_GROUP:heartbeat-test}}
rocketmq.consumer.group=${TEST_ROCKETMQ_CONSUMER_GROUP:${ROCKETMQ_CONSUMER_GROUP:heartbeat-test}}
spring.kafka.bootstrap-servers=${TEST_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}}
heartbeat.middleware.mqtt.host=${TEST_MQTT_HOST:${MQTT_HOST:127.0.0.1}}
heartbeat.middleware.mqtt.port=${TEST_MQTT_PORT:${MQTT_PORT:1883}}
spring.quartz.job-store-type=memory

heartbeat.security.dev-auto-login=false
heartbeat.security.dev-header-enabled=false
heartbeat.release.lane=test

logging.level.top.kx.heartbeat=debug