# ==================== Druid \u6570\u636E\u6E90\uFF08\u672C\u5730 MySQL\uFF09 ====================
spring.datasource.druid.url=jdbc:mysql://${LOCAL_MYSQL_HOST:${MYSQL_HOST:127.0.0.1}}:${LOCAL_MYSQL_PORT:${MYSQL_PORT:3306}}/${LOCAL_MYSQL_DB:${MYSQL_DB:heartbeat_local}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=${LOCAL_MYSQL_USE_SSL:${MYSQL_USE_SSL:false}}&allowPublicKeyRetrieval=${LOCAL_MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:true}}&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.druid.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.druid.username=${LOCAL_MYSQL_USERNAME:${MYSQL_USERNAME}}
spring.datasource.druid.password=${LOCAL_MYSQL_PASSWORD:${MYSQL_PASSWORD}}
# \u672C\u5730\u8FDE\u63A5\u6C60\u4FDD\u6301\u8F7B\u91CF
spring.datasource.druid.min-idle=1
spring.datasource.druid.max-active=5
spring.datasource.druid.stat-view-servlet.enabled=${LOCAL_DRUID_STAT_ENABLED:${DRUID_STAT_ENABLED:false}}
spring.datasource.druid.web-stat-filter.enabled=${LOCAL_DRUID_STAT_ENABLED:${DRUID_STAT_ENABLED:false}}
spring.sql.init.mode=never
spring.flyway.enabled=true

# ==================== \u5176\u4ED6\u672C\u5730\u73AF\u5883\u7279\u6709\u914D\u7F6E ====================
heartbeat.middleware.redis.enabled=${LOCAL_REDIS_ENABLED:${REDIS_ENABLED:false}}
heartbeat.middleware.rocketmq.enabled=${LOCAL_ROCKETMQ_ENABLED:${ROCKETMQ_ENABLED:false}}
heartbeat.middleware.kafka.enabled=${LOCAL_KAFKA_ENABLED:${KAFKA_ENABLED:false}}
heartbeat.middleware.mqtt.enabled=${LOCAL_MQTT_ENABLED:${MQTT_ENABLED:false}}
heartbeat.middleware.quartz.enabled=${LOCAL_QUARTZ_ENABLED:${QUARTZ_ENABLED:false}}

spring.redis.host=${LOCAL_REDIS_HOST:${REDIS_HOST:127.0.0.1}}
spring.redis.port=${LOCAL_REDIS_PORT:${REDIS_PORT:6379}}
spring.redis.database=${REDIS_DATABASE:15}
rocketmq.name-server=${LOCAL_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
rocketmq.producer.group=${LOCAL_ROCKETMQ_PRODUCER_GROUP:${ROCKETMQ_PRODUCER_GROUP:heartbeat-local}}
rocketmq.consumer.group=${LOCAL_ROCKETMQ_CONSUMER_GROUP:${ROCKETMQ_CONSUMER_GROUP:heartbeat-local}}
spring.kafka.bootstrap-servers=${LOCAL_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}}
heartbeat.middleware.mqtt.host=${LOCAL_MQTT_HOST:${MQTT_HOST:127.0.0.1}}
heartbeat.middleware.mqtt.port=${LOCAL_MQTT_PORT:${MQTT_PORT:1883}}
spring.quartz.job-store-type=memory
heartbeat.security.dev-auto-login=${LOCAL_DEV_AUTO_LOGIN:false}
heartbeat.security.dev-header-enabled=${LOCAL_DEV_HEADER_ENABLED:false}
heartbeat.security.allow-default-admin-password=true
heartbeat.report.dynamic-sql.enabled=true
logging.level.top.kx.heartbeat=${LOCAL_APP_LOG_LEVEL:${APP_LOG_LEVEL:debug}}
