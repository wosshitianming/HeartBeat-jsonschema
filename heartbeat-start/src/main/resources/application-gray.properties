# ==================== Druid \u6570\u636E\u6E90\uFF08\u7070\u5EA6\u73AF\u5883\uFF09 ====================
# \u6CE8\u610F\uFF1Adriver-class-name \u548C type \u5DF2\u5728\u4E3B\u914D\u7F6E\u6587\u4EF6\u7EDF\u4E00\u8BBE\u7F6E\uFF0C\u8FD9\u91CC\u65E0\u9700\u91CD\u590D
spring.datasource.druid.url=jdbc:mysql://${GRAY_MYSQL_HOST:${MYSQL_HOST:127.0.0.1}}:${GRAY_MYSQL_PORT:${MYSQL_PORT:3306}}/${GRAY_MYSQL_DB:${MYSQL_DB:heartbeat_gray}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=${GRAY_MYSQL_USE_SSL:${MYSQL_USE_SSL:false}}&allowPublicKeyRetrieval=${GRAY_MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:true}}&rewriteBatchedStatements=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.druid.username=${GRAY_MYSQL_USERNAME:${MYSQL_USERNAME}}
spring.datasource.druid.password=${GRAY_MYSQL_PASSWORD:${MYSQL_PASSWORD}}

# Druid \u8FDE\u63A5\u6C60\u5927\u5C0F\uFF08\u8986\u76D6\u4E3B\u914D\u7F6E\u9ED8\u8BA4\u503C\uFF09
spring.datasource.druid.min-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.druid.max-active=${DB_POOL_MAX_SIZE:20}
spring.datasource.druid.stat-view-servlet.enabled=false
spring.datasource.druid.web-stat-filter.enabled=false

# ==================== \u5176\u4ED6\u7070\u5EA6\u73AF\u5883\u7279\u6709\u914D\u7F6E ====================
heartbeat.middleware.redis.enabled=${GRAY_REDIS_ENABLED:${REDIS_ENABLED:false}}
heartbeat.middleware.rocketmq.enabled=${GRAY_ROCKETMQ_ENABLED:${ROCKETMQ_ENABLED:false}}
heartbeat.middleware.kafka.enabled=${GRAY_KAFKA_ENABLED:${KAFKA_ENABLED:false}}
heartbeat.middleware.mqtt.enabled=${GRAY_MQTT_ENABLED:${MQTT_ENABLED:false}}
heartbeat.middleware.quartz.enabled=${GRAY_QUARTZ_ENABLED:${QUARTZ_ENABLED:false}}

spring.redis.host=${GRAY_REDIS_HOST:${REDIS_HOST:127.0.0.1}}
spring.redis.port=${GRAY_REDIS_PORT:${REDIS_PORT:6379}}
spring.redis.database=${GRAY_REDIS_DATABASE:${REDIS_DATABASE:3}}
rocketmq.name-server=${GRAY_ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
rocketmq.producer.group=${GRAY_ROCKETMQ_PRODUCER_GROUP:${ROCKETMQ_PRODUCER_GROUP:heartbeat-gray}}
rocketmq.consumer.group=${GRAY_ROCKETMQ_CONSUMER_GROUP:${ROCKETMQ_CONSUMER_GROUP:heartbeat-gray}}
spring.kafka.bootstrap-servers=${GRAY_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}}
heartbeat.middleware.mqtt.host=${GRAY_MQTT_HOST:${MQTT_HOST:127.0.0.1}}
heartbeat.middleware.mqtt.port=${GRAY_MQTT_PORT:${MQTT_PORT:1883}}

spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=15000

heartbeat.security.dev-auto-login=false
heartbeat.security.dev-header-enabled=false
heartbeat.security.allow-default-admin-password=false
heartbeat.report.dynamic-sql.enabled=false
heartbeat.security.jwt.secret=${JWT_SECRET}
heartbeat.security.secret-key=${HEARTBEAT_SECURITY_SECRET_KEY}
heartbeat.release.lane=gray
logging.level.top.kx.heartbeat=${GRAY_APP_LOG_LEVEL:${APP_LOG_LEVEL:info}}
