server.port=${SERVER_PORT:7001}
server.shutdown=graceful
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.tomcat.threads.max=${SERVER_MAX_THREADS:200}
server.tomcat.threads.min-spare=${SERVER_MIN_SPARE_THREADS:10}
server.tomcat.accept-count=${SERVER_ACCEPT_COUNT:100}
server.tomcat.connection-timeout=${SERVER_CONNECTION_TIMEOUT:20s}

spring.application.name=heartbeat
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== \u6570\u636E\u6E90\u901A\u7528\u914D\u7F6E\uFF08Druid\uFF09 ====================
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
# \u9A71\u52A8\u7C7B\u540D\u7531\u5404\u73AF\u5883\u914D\u7F6E\u6587\u4EF6\u6307\u5B9A\uFF08\u4E5F\u53EF\u4EE5\u5728\u8FD9\u91CC\u7EDF\u4E00\u6307\u5B9A\uFF09
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# \u8FDE\u63A5\u6C60\u901A\u7528\u53C2\u6570\uFF08\u6240\u6709\u73AF\u5883\u7EE7\u627F\uFF09
spring.datasource.druid.initial-size=${DB_INITIAL_SIZE:2}
spring.datasource.druid.min-idle=${DB_MIN_IDLE:2}
spring.datasource.druid.max-active=${DB_MAX_ACTIVE:20}
spring.datasource.druid.max-wait=${DB_MAX_WAIT:30000}
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.validation-query=SELECT 1
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20

# ==================== Druid \u76D1\u63A7\u914D\u7F6E\uFF08\u53EF\u9009\uFF0C\u5F00\u53D1\u73AF\u5883\u63A8\u8350\u5F00\u542F\uFF09 ====================
spring.datasource.druid.stat-view-servlet.enabled=true
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
spring.datasource.druid.stat-view-servlet.reset-enable=false
# \u76D1\u63A7\u9875\u9762\u767B\u5F55\u8D26\u53F7\u5BC6\u7801\uFF08\u5EFA\u8BAE\u901A\u8FC7\u73AF\u5883\u53D8\u91CF\u6CE8\u5165\uFF09
spring.datasource.druid.stat-view-servlet.login-username=${DRUID_USERNAME:admin}
spring.datasource.druid.stat-view-servlet.login-password=${DRUID_PASSWORD:admin}

spring.datasource.druid.web-stat-filter.enabled=true
spring.datasource.druid.web-stat-filter.url-pattern=/*
spring.datasource.druid.web-stat-filter.exclusions=*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*


spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=false
spring.flyway.encoding=UTF-8

heartbeat.middleware.redis.enabled=${REDIS_ENABLED:false}
heartbeat.middleware.rocketmq.enabled=${ROCKETMQ_ENABLED:false}
heartbeat.middleware.kafka.enabled=${KAFKA_ENABLED:false}
heartbeat.middleware.mqtt.enabled=${MQTT_ENABLED:false}
heartbeat.middleware.quartz.enabled=${QUARTZ_ENABLED:false}

heartbeat.flow.runtime.engine=${FLOW_RUNTIME_ENGINE:FLOWABLE}
heartbeat.flow.runtime.debug-engine=${FLOW_DEBUG_ENGINE:LOCAL_DEBUG}
heartbeat.flow.default-tenant-id=${FLOW_DEFAULT_TENANT_ID:1}
heartbeat.flow.flowable.deploy-on-publish=${FLOWABLE_DEPLOY_ON_PUBLISH:true}
heartbeat.flow.flowable.sync-history-projection=${FLOWABLE_SYNC_HISTORY_PROJECTION:true}
heartbeat.flow.flowable.inline-payload-max-bytes=${FLOWABLE_INLINE_PAYLOAD_MAX_BYTES:65536}
heartbeat.flow.projection.mode=${FLOW_PROJECTION_MODE:LOCAL_TX}
flowable.database-schema-update=${FLOWABLE_DATABASE_SCHEMA_UPDATE:true}
flowable.async-executor-activate=${FLOWABLE_ASYNC_EXECUTOR_ACTIVATE:true}
flowable.history-level=${FLOWABLE_HISTORY_LEVEL:full}
flowable.check-process-definitions=${FLOWABLE_CHECK_PROCESS_DEFINITIONS:false}

spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.username=${REDIS_USERNAME:}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DATABASE:0}
spring.redis.timeout=${REDIS_TIMEOUT:3s}
spring.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:3s}
spring.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:16}
spring.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:1}
spring.redis.lettuce.pool.max-wait=${REDIS_POOL_MAX_WAIT:2s}
spring.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.repositories.enabled=false

rocketmq.name-server=${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
rocketmq.access-channel=${ROCKETMQ_ACCESS_CHANNEL:LOCAL}
rocketmq.producer.group=${ROCKETMQ_PRODUCER_GROUP:heartbeat-${spring.profiles.active}}
rocketmq.producer.access-key=${ROCKETMQ_ACCESS_KEY:}
rocketmq.producer.secret-key=${ROCKETMQ_SECRET_KEY:}
rocketmq.producer.send-message-timeout=${ROCKETMQ_SEND_MESSAGE_TIMEOUT:3000}
rocketmq.producer.retry-times-when-send-failed=${ROCKETMQ_RETRY_TIMES_WHEN_SEND_FAILED:2}
rocketmq.producer.retry-times-when-send-async-failed=${ROCKETMQ_RETRY_TIMES_WHEN_SEND_ASYNC_FAILED:2}
rocketmq.producer.max-message-size=${ROCKETMQ_MAX_MESSAGE_SIZE:4194304}
rocketmq.producer.retry-next-server=${ROCKETMQ_RETRY_NEXT_SERVER:false}
rocketmq.consumer.group=${ROCKETMQ_CONSUMER_GROUP:heartbeat-${spring.profiles.active}}
rocketmq.consumer.topic=${ROCKETMQ_CONSUMER_TOPIC:heartbeat-events}
rocketmq.consumer.access-key=${ROCKETMQ_ACCESS_KEY:}
rocketmq.consumer.secret-key=${ROCKETMQ_SECRET_KEY:}
rocketmq.consumer.message-model=${ROCKETMQ_CONSUMER_MESSAGE_MODEL:CLUSTERING}
rocketmq.consumer.selector-type=${ROCKETMQ_CONSUMER_SELECTOR_TYPE:TAG}
rocketmq.consumer.selector-expression=${ROCKETMQ_CONSUMER_SELECTOR_EXPRESSION:*}
rocketmq.consumer.pull-batch-size=${ROCKETMQ_CONSUMER_PULL_BATCH_SIZE:10}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
spring.kafka.client-id=${KAFKA_CLIENT_ID:heartbeat-${spring.profiles.active}}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:heartbeat-${spring.profiles.active}}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.listener.ack-mode=record
spring.kafka.listener.auto-startup=${KAFKA_LISTENER_AUTO_STARTUP:${heartbeat.middleware.kafka.enabled:false}}
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.properties.request.timeout.ms=30000
spring.kafka.properties.delivery.timeout.ms=120000

spring.quartz.job-store-type=memory
spring.quartz.auto-startup=${QUARTZ_AUTO_STARTUP:${heartbeat.middleware.quartz.enabled:false}}
spring.quartz.overwrite-existing-jobs=true
spring.quartz.wait-for-jobs-to-complete-on-shutdown=true
spring.quartz.properties.org.quartz.scheduler.instanceName=HeartBeatScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.threadPool.threadCount=${QUARTZ_THREAD_COUNT:10}
spring.quartz.properties.org.quartz.threadPool.threadPriority=5

spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

spring.task.execution.thread-name-prefix=heartbeat-async-
spring.task.execution.pool.core-size=${ASYNC_CORE_SIZE:8}
spring.task.execution.pool.max-size=${ASYNC_MAX_SIZE:32}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:200}
spring.task.execution.pool.keep-alive=60s
spring.task.scheduling.thread-name-prefix=heartbeat-scheduling-
spring.task.scheduling.pool.size=${SCHEDULING_POOL_SIZE:4}

heartbeat.security.jwt.secret=${JWT_SECRET:heartbeat-dev-secret-change-in-production-32bytes-min}
heartbeat.security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:120}
heartbeat.security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}

heartbeat.middleware.mqtt.host=${MQTT_HOST:127.0.0.1}
heartbeat.middleware.mqtt.port=${MQTT_PORT:1883}
heartbeat.middleware.mqtt.username=${MQTT_USERNAME:}
heartbeat.middleware.mqtt.password=${MQTT_PASSWORD:}
heartbeat.middleware.mqtt.client-id=${MQTT_CLIENT_ID:heartbeat-${spring.profiles.active}}
heartbeat.middleware.mqtt.clean-session=${MQTT_CLEAN_SESSION:true}
heartbeat.middleware.mqtt.automatic-reconnect=${MQTT_AUTOMATIC_RECONNECT:true}
heartbeat.middleware.mqtt.connection-timeout-seconds=${MQTT_CONNECTION_TIMEOUT_SECONDS:10}
heartbeat.middleware.mqtt.keep-alive-seconds=${MQTT_KEEP_ALIVE_SECONDS:30}
heartbeat.middleware.mqtt.default-qos=${MQTT_DEFAULT_QOS:1}

mybatis.mapper-locations=classpath*:/mapper/**/*.xml,classpath*:/mapper-xml/**/*.xml
# Entity aliases are intentionally disabled. MyBatis Generator creates many
# inner classes named Criteria, and package-wide alias scanning maps them all
# to the same alias and breaks SqlSessionFactory startup.
# mybatis.type-aliases-package=top.kx.heartbeat.infrastructure.persistence.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=false
mybatis.configuration.lazy-loading-enabled=false
mybatis.configuration.aggressive-lazy-loading=false
mybatis.configuration.call-setters-on-nulls=true
mybatis.configuration.default-statement-timeout=${MYBATIS_STATEMENT_TIMEOUT:30}

# ==================== PageHelper \u5206\u9875\u63D2\u4EF6 ====================
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:${heartbeat.middleware.redis.enabled:false}}
management.endpoint.quartz.enabled=${QUARTZ_ENDPOINT_ENABLED:${heartbeat.middleware.quartz.enabled:false}}
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active}

logging.level.root=info
logging.level.top.kx.heartbeat=info
logging.level.org.mybatis=info
