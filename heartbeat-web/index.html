<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HeartBeat 多样例结构推断与 JSON Schema 生成工具" />
    <title>HeartBeat Schema Studio</title>
  </head>
  <body>
    <script>
      try {
        const allowed = ['immersive', 'balanced', 'professional']
        const userId = localStorage.getItem('heartbeat_last_user_id')
        const cached = userId && localStorage.getItem(`heartbeat_appearance_theme:${userId}`)
        document.documentElement.dataset.theme = allowed.includes(cached) ? cached : 'balanced'
      } catch {
        document.documentElement.dataset.theme = 'balanced'
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
